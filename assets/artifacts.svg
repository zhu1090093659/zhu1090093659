<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520" shape-rendering="crispEdges" font-family="'Courier New', ui-monospace, monospace">
  <defs>
    <linearGradient id="vaultSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a6e"/>
      <stop offset="100%" stop-color="#020218"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="520" fill="url(#vaultSky)"/>

  <!-- Outer border -->
  <rect x="12" y="12" width="976" height="496" fill="#000033" stroke="#ffffff" stroke-width="4"/>
  <rect x="24" y="24" width="952" height="472" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Title -->
  <rect x="40" y="40" width="920" height="48" fill="#000055" stroke="#ffd93d" stroke-width="2"/>
  <g fill="#ffd93d">
    <rect x="196" y="62" width="4" height="4"/><rect x="192" y="66" width="12" height="4"/><rect x="196" y="70" width="4" height="4"/>
    <rect x="800" y="62" width="4" height="4"/><rect x="796" y="66" width="12" height="4"/><rect x="800" y="70" width="4" height="4"/>
  </g>
  <text x="500" y="72" fill="#ffd93d" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="4">ARTIFACTS  ·  THE  HERO'S  OPEN  RELICS</text>

  <!-- ============ ARTIFACT 1: spec_driven_develop (SWORD) ============ -->
  <g transform="translate(40, 110)">
    <rect width="920" height="110" fill="#000055" stroke="#ffffff" stroke-width="2"/>

    <!-- Pixel sword icon on left (anchored at 20, 15, pixel=6) -->
    <g transform="translate(20, 10)">
      <!-- Blade -->
      <rect x="44" y="0" width="12" height="6" fill="#e0e0e0"/>
      <rect x="42" y="6" width="16" height="6" fill="#f5f5f5"/>
      <rect x="40" y="12" width="20" height="6" fill="#e0e0e0"/>
      <rect x="40" y="18" width="20" height="6" fill="#c0c0c0"/>
      <rect x="40" y="24" width="20" height="6" fill="#e0e0e0"/>
      <rect x="40" y="30" width="20" height="6" fill="#c0c0c0"/>
      <rect x="40" y="36" width="20" height="6" fill="#e0e0e0"/>
      <rect x="40" y="42" width="20" height="6" fill="#c0c0c0"/>
      <rect x="40" y="48" width="20" height="6" fill="#e0e0e0"/>
      <!-- Highlight stripe -->
      <rect x="46" y="6" width="4" height="42" fill="#ffffff"/>
      <!-- Crossguard -->
      <rect x="20" y="54" width="60" height="6" fill="#ffd93d"/>
      <rect x="26" y="60" width="48" height="6" fill="#b87030"/>
      <!-- Handle -->
      <rect x="44" y="66" width="12" height="18" fill="#5c3a1f"/>
      <!-- Pommel -->
      <rect x="40" y="84" width="20" height="6" fill="#ffd93d"/>
      <rect x="44" y="90" width="12" height="4" fill="#d4a040"/>
    </g>

    <!-- Name + description -->
    <text x="130" y="34" fill="#ffd93d" font-size="18" font-weight="bold">&gt;  SPEC-DRIVEN-DEVELOP</text>
    <text x="130" y="56" fill="#ffffff" font-size="13" font-weight="bold">* PLATFORM-AGNOSTIC AGENT SKILL. A SINGLE MARKDOWN SCROLL</text>
    <text x="130" y="74" fill="#ffffff" font-size="13" font-weight="bold">  THAT TEACHES ANY AI AGENT THE PRE-DEV WORKFLOW.</text>
    <text x="130" y="94" fill="#a8d8ff" font-size="11" font-weight="bold">  [ TYPE : LEGENDARY BLADE  ·  EFFECT : +99 SPEC CLARITY ]</text>

    <!-- Star count box on right -->
    <rect x="740" y="20" width="160" height="68" fill="#220000" stroke="#ffd93d" stroke-width="2"/>
    <!-- Pixel star -->
    <g transform="translate(760, 30)" fill="#ffd93d">
      <rect x="10" y="0" width="4" height="4"/>
      <rect x="8" y="4" width="8" height="4"/>
      <rect x="0" y="8" width="24" height="4"/>
      <rect x="2" y="12" width="20" height="4"/>
      <rect x="4" y="16" width="4" height="4"/><rect x="16" y="16" width="4" height="4"/>
    </g>
    <text x="800" y="68" fill="#ffd93d" font-size="20" font-weight="bold">657</text>
    <text x="800" y="84" fill="#ffffff" font-size="11" font-weight="bold">STARS</text>
  </g>

  <!-- ============ ARTIFACT 2: claude-code-cookbook (TOME) ============ -->
  <g transform="translate(40, 235)">
    <rect width="920" height="110" fill="#000055" stroke="#ffffff" stroke-width="2"/>

    <!-- Pixel book/tome icon on left -->
    <g transform="translate(20, 10)">
      <!-- Book cover -->
      <rect x="0" y="4" width="80" height="82" fill="#7a2020"/>
      <rect x="0" y="4" width="80" height="6" fill="#5c1010"/>
      <rect x="0" y="82" width="80" height="4" fill="#5c1010"/>
      <!-- Spine -->
      <rect x="0" y="4" width="8" height="82" fill="#4c0a0a"/>
      <!-- Gold trim -->
      <rect x="10" y="10" width="66" height="2" fill="#ffd93d"/>
      <rect x="10" y="78" width="66" height="2" fill="#ffd93d"/>
      <!-- Cover emblem (book pages icon) -->
      <rect x="30" y="26" width="28" height="36" fill="#ffd93d"/>
      <rect x="34" y="30" width="20" height="28" fill="#7a2020"/>
      <rect x="36" y="34" width="16" height="2" fill="#ffd93d"/>
      <rect x="36" y="40" width="16" height="2" fill="#ffd93d"/>
      <rect x="36" y="46" width="16" height="2" fill="#ffd93d"/>
      <rect x="36" y="52" width="10" height="2" fill="#ffd93d"/>
      <!-- Bookmark ribbon -->
      <rect x="72" y="0" width="6" height="24" fill="#ffd93d"/>
      <polygon points="72,24 78,24 75,30"/>
    </g>

    <text x="130" y="34" fill="#ffd93d" font-size="18" font-weight="bold">&gt;  CLAUDE-CODE-COOKBOOK</text>
    <text x="130" y="56" fill="#ffffff" font-size="13" font-weight="bold">* BILINGUAL GRIMOIRE OF CLAUDE CODE.  COVERS ARCHITECTURE,</text>
    <text x="130" y="74" fill="#ffffff" font-size="13" font-weight="bold">  EXECUTION FLOW, TOOL SYSTEMS  -  THE FULL LEARNING PATH.</text>
    <text x="130" y="94" fill="#a8d8ff" font-size="11" font-weight="bold">  [ TYPE : ANCIENT TOME  ·  EFFECT : +77 WISDOM TO READERS ]</text>

    <rect x="740" y="20" width="160" height="68" fill="#220000" stroke="#ffd93d" stroke-width="2"/>
    <g transform="translate(760, 30)" fill="#ffd93d">
      <rect x="10" y="0" width="4" height="4"/>
      <rect x="8" y="4" width="8" height="4"/>
      <rect x="0" y="8" width="24" height="4"/>
      <rect x="2" y="12" width="20" height="4"/>
      <rect x="4" y="16" width="4" height="4"/><rect x="16" y="16" width="4" height="4"/>
    </g>
    <text x="800" y="68" fill="#ffd93d" font-size="20" font-weight="bold">369</text>
    <text x="800" y="84" fill="#ffffff" font-size="11" font-weight="bold">STARS</text>
  </g>

  <!-- ============ ARTIFACT 3: minister (ORB) ============ -->
  <g transform="translate(40, 360)">
    <rect width="920" height="110" fill="#000055" stroke="#ffffff" stroke-width="2"/>

    <!-- Pixel orb/gem icon -->
    <g transform="translate(20, 10)">
      <!-- Orb stand -->
      <rect x="24" y="72" width="40" height="6" fill="#805030"/>
      <rect x="20" y="78" width="48" height="8" fill="#b87030"/>
      <rect x="26" y="70" width="36" height="2" fill="#5c3a1f"/>
      <!-- Orb -->
      <rect x="28" y="6" width="28" height="6" fill="#4dabf7"/>
      <rect x="20" y="12" width="44" height="6" fill="#4dabf7"/>
      <rect x="14" y="18" width="56" height="6" fill="#4dabf7"/>
      <rect x="14" y="24" width="56" height="6" fill="#4dabf7"/>
      <rect x="14" y="30" width="56" height="6" fill="#4dabf7"/>
      <rect x="14" y="36" width="56" height="6" fill="#4dabf7"/>
      <rect x="14" y="42" width="56" height="6" fill="#4dabf7"/>
      <rect x="20" y="48" width="44" height="6" fill="#4dabf7"/>
      <rect x="28" y="54" width="28" height="6" fill="#4dabf7"/>
      <!-- Highlight -->
      <rect x="24" y="12" width="12" height="6" fill="#a8d8ff"/>
      <rect x="20" y="18" width="16" height="6" fill="#a8d8ff"/>
      <rect x="20" y="24" width="8" height="6" fill="#a8d8ff"/>
      <!-- Glow dots around orb -->
      <rect x="2" y="24" width="2" height="2" fill="#ffd93d"/>
      <rect x="78" y="30" width="2" height="2" fill="#ffd93d"/>
      <rect x="4" y="50" width="2" height="2" fill="#ffd93d"/>
      <rect x="76" y="48" width="2" height="2" fill="#ffd93d"/>
    </g>

    <text x="130" y="34" fill="#ffd93d" font-size="18" font-weight="bold">&gt;  MINISTER</text>
    <text x="130" y="56" fill="#ffffff" font-size="13" font-weight="bold">* BINDS CLAUDE CODE AND CODEX TO FEISHU, SUMMONING</text>
    <text x="130" y="74" fill="#ffffff" font-size="13" font-weight="bold">  AN AI OMNI-COLLEAGUE FOR THE ENTIRE GUILD.</text>
    <text x="130" y="94" fill="#a8d8ff" font-size="11" font-weight="bold">  [ TYPE : CRYSTAL ORB  ·  EFFECT : TEAM-WIDE AI SUMMON ]</text>

    <rect x="740" y="20" width="160" height="68" fill="#220000" stroke="#ffd93d" stroke-width="2"/>
    <g transform="translate(760, 30)" fill="#ffd93d">
      <rect x="10" y="0" width="4" height="4"/>
      <rect x="8" y="4" width="8" height="4"/>
      <rect x="0" y="8" width="24" height="4"/>
      <rect x="2" y="12" width="20" height="4"/>
      <rect x="4" y="16" width="4" height="4"/><rect x="16" y="16" width="4" height="4"/>
    </g>
    <text x="800" y="68" fill="#ffd93d" font-size="20" font-weight="bold">128</text>
    <text x="800" y="84" fill="#ffffff" font-size="11" font-weight="bold">STARS</text>
  </g>
</svg>

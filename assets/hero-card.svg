<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560" shape-rendering="crispEdges" font-family="'Courier New', ui-monospace, monospace">
  <defs>
    <!-- Starfield pattern behind the dialog -->
    <pattern id="stars" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#030322"/>
      <rect x="12" y="18" width="2" height="2" fill="#aaaaff" opacity="0.7"/>
      <rect x="55" y="33" width="2" height="2" fill="#ffffff" opacity="0.9"/>
      <rect x="73" y="67" width="2" height="2" fill="#ffee88" opacity="0.8"/>
      <rect x="28" y="81" width="2" height="2" fill="#ffffff" opacity="0.5"/>
      <rect x="88" y="11" width="2" height="2" fill="#aaffff" opacity="0.7"/>
      <rect x="6" y="55" width="2" height="2" fill="#ffffff" opacity="0.6"/>
      <rect x="40" y="90" width="2" height="2" fill="#aaccff" opacity="0.6"/>
    </pattern>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a6e"/>
      <stop offset="100%" stop-color="#020218"/>
    </linearGradient>
  </defs>

  <!-- ===== STAR-FIELD BACKGROUND ===== -->
  <rect width="1000" height="560" fill="url(#sky)"/>
  <rect width="1000" height="560" fill="url(#stars)" opacity="0.45"/>

  <!-- ===== DQ DIALOG OUTER BORDER (double-line white) ===== -->
  <rect x="12" y="12" width="976" height="536" fill="#000033" stroke="#ffffff" stroke-width="4"/>
  <rect x="24" y="24" width="952" height="512" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- ===== TITLE BAR ===== -->
  <rect x="40" y="40" width="920" height="56" fill="#000055" stroke="#ffd93d" stroke-width="2"/>
  <!-- Gold diamonds on each side -->
  <g fill="#ffd93d">
    <rect x="58" y="64" width="4" height="4"/><rect x="54" y="68" width="4" height="4"/>
    <rect x="62" y="68" width="4" height="4"/><rect x="58" y="72" width="4" height="4"/>
    <rect x="938" y="64" width="4" height="4"/><rect x="934" y="68" width="4" height="4"/>
    <rect x="942" y="68" width="4" height="4"/><rect x="938" y="72" width="4" height="4"/>
  </g>
  <text x="380" y="78" fill="#ffd93d" font-size="26" font-weight="bold" text-anchor="end" letter-spacing="6">CODER'S</text>
  <g fill="#ffd93d">
    <!-- Decorative centered sword/diamond between words -->
    <rect x="478" y="62" width="4" height="4"/>
    <rect x="474" y="66" width="12" height="4"/>
    <rect x="470" y="70" width="20" height="4"/>
    <rect x="474" y="74" width="12" height="4"/>
    <rect x="478" y="78" width="4" height="4"/>
    <rect x="496" y="68" width="3" height="8"/>
    <rect x="511" y="68" width="3" height="8"/>
    <rect x="526" y="68" width="3" height="8"/>
  </g>
  <text x="620" y="78" fill="#ffd93d" font-size="26" font-weight="bold" text-anchor="start" letter-spacing="6">QUEST</text>

  <!-- ===== LEFT: SLIME SPRITE FRAME ===== -->
  <rect x="60" y="130" width="260" height="260" fill="#000055" stroke="#ffffff" stroke-width="3"/>
  <!-- Inner "window" pattern (checker floor) -->
  <g fill="#12123a">
    <rect x="66" y="136" width="248" height="248"/>
  </g>
  <!-- Faint checker floor tiles -->
  <g fill="#1e1e4e" opacity="0.7">
    <rect x="66" y="300" width="62" height="30"/><rect x="190" y="300" width="62" height="30"/>
    <rect x="128" y="330" width="62" height="30"/><rect x="252" y="330" width="62" height="28"/>
    <rect x="66" y="360" width="62" height="24"/><rect x="190" y="360" width="62" height="24"/>
  </g>

  <!-- SLIME SPRITE: 14x14 grid, pixel size = 12, anchored at (100, 170). Total 168x168. -->
  <!-- Body pixels (cyan-blue #4da8ff), shadow (#2160ad), highlight (#a8d8ff), eyes white+black, mouth black -->
  <g transform="translate(112,170)">
    <!-- Row 0: tip crown -->
    <rect x="72" y="0" width="24" height="12" fill="#4da8ff"/>
    <!-- Row 1: slightly wider -->
    <rect x="60" y="12" width="48" height="12" fill="#4da8ff"/>
    <rect x="72" y="12" width="12" height="12" fill="#a8d8ff"/>
    <!-- Row 2 -->
    <rect x="48" y="24" width="72" height="12" fill="#4da8ff"/>
    <rect x="60" y="24" width="24" height="12" fill="#a8d8ff"/>
    <!-- Row 3 -->
    <rect x="36" y="36" width="96" height="12" fill="#4da8ff"/>
    <rect x="48" y="36" width="24" height="12" fill="#a8d8ff"/>
    <!-- Row 4 -->
    <rect x="24" y="48" width="120" height="12" fill="#4da8ff"/>
    <rect x="36" y="48" width="24" height="12" fill="#a8d8ff"/>
    <!-- Row 5 (eyes row) -->
    <rect x="24" y="60" width="120" height="12" fill="#4da8ff"/>
    <rect x="48" y="60" width="12" height="12" fill="#ffffff"/>
    <rect x="108" y="60" width="12" height="12" fill="#ffffff"/>
    <!-- Row 6 (pupils) -->
    <rect x="12" y="72" width="144" height="12" fill="#4da8ff"/>
    <rect x="48" y="72" width="12" height="12" fill="#ffffff"/>
    <rect x="36" y="72" width="12" height="12" fill="#000000"/>
    <rect x="108" y="72" width="12" height="12" fill="#ffffff"/>
    <rect x="96" y="72" width="12" height="12" fill="#000000"/>
    <!-- Row 7 -->
    <rect x="12" y="84" width="144" height="12" fill="#4da8ff"/>
    <!-- Row 8 (smile) -->
    <rect x="12" y="96" width="144" height="12" fill="#4da8ff"/>
    <rect x="60" y="96" width="12" height="12" fill="#1a3560"/>
    <rect x="72" y="102" width="24" height="6" fill="#1a3560"/>
    <rect x="96" y="96" width="12" height="12" fill="#1a3560"/>
    <!-- Row 9 -->
    <rect x="0" y="108" width="168" height="12" fill="#4da8ff"/>
    <rect x="0" y="108" width="168" height="4" fill="#2160ad" opacity="0.3"/>
    <!-- Row 10 -->
    <rect x="0" y="120" width="168" height="12" fill="#4da8ff"/>
    <rect x="0" y="120" width="168" height="4" fill="#2160ad" opacity="0.25"/>
    <!-- Row 11 (wavy bottom) -->
    <rect x="0" y="132" width="24" height="12" fill="#4da8ff"/>
    <rect x="36" y="132" width="24" height="12" fill="#4da8ff"/>
    <rect x="72" y="132" width="24" height="12" fill="#4da8ff"/>
    <rect x="108" y="132" width="24" height="12" fill="#4da8ff"/>
    <rect x="144" y="132" width="24" height="12" fill="#4da8ff"/>
    <!-- Shadow on ground -->
    <ellipse cx="84" cy="158" rx="84" ry="6" fill="#000000" opacity="0.4"/>
  </g>

  <!-- ===== MIDDLE/RIGHT: STATUS PANEL ===== -->
  <rect x="350" y="130" width="610" height="260" fill="#000055" stroke="#ffffff" stroke-width="3"/>

  <!-- Stats lines (DQ "* " period-prefix style) -->
  <g fill="#ffffff" font-size="18" font-weight="bold">
    <text x="376" y="166">* NAME  ..........  ZHU  ( @zhu1090093659 )</text>
    <text x="376" y="196">* CLASS  .........  AI FULL-STACK SORCERER</text>
    <text x="376" y="226">* LEVEL  .........  99</text>
    <text x="376" y="256">* REALM  .........  SHENZHEN,  THE GOLD CITY</text>
  </g>

  <!-- HP bar -->
  <text x="376" y="298" fill="#ff6b6b" font-size="18" font-weight="bold">HP</text>
  <rect x="410" y="282" width="440" height="22" fill="#220000" stroke="#ffffff" stroke-width="2"/>
  <g fill="#ff5252">
    <!-- 18 segments, all full -->
    <rect x="414" y="286" width="22" height="14"/><rect x="438" y="286" width="22" height="14"/>
    <rect x="462" y="286" width="22" height="14"/><rect x="486" y="286" width="22" height="14"/>
    <rect x="510" y="286" width="22" height="14"/><rect x="534" y="286" width="22" height="14"/>
    <rect x="558" y="286" width="22" height="14"/><rect x="582" y="286" width="22" height="14"/>
    <rect x="606" y="286" width="22" height="14"/><rect x="630" y="286" width="22" height="14"/>
    <rect x="654" y="286" width="22" height="14"/><rect x="678" y="286" width="22" height="14"/>
    <rect x="702" y="286" width="22" height="14"/><rect x="726" y="286" width="22" height="14"/>
    <rect x="750" y="286" width="22" height="14"/><rect x="774" y="286" width="22" height="14"/>
    <rect x="798" y="286" width="22" height="14"/><rect x="822" y="286" width="22" height="14"/>
  </g>
  <text x="864" y="298" fill="#ffffff" font-size="18" font-weight="bold">999 / 999</text>

  <!-- MP bar -->
  <text x="376" y="334" fill="#4dabf7" font-size="18" font-weight="bold">MP</text>
  <rect x="410" y="318" width="440" height="22" fill="#000822" stroke="#ffffff" stroke-width="2"/>
  <g fill="#4dabf7">
    <rect x="414" y="322" width="22" height="14"/><rect x="438" y="322" width="22" height="14"/>
    <rect x="462" y="322" width="22" height="14"/><rect x="486" y="322" width="22" height="14"/>
    <rect x="510" y="322" width="22" height="14"/><rect x="534" y="322" width="22" height="14"/>
    <rect x="558" y="322" width="22" height="14"/><rect x="582" y="322" width="22" height="14"/>
    <rect x="606" y="322" width="22" height="14"/><rect x="630" y="322" width="22" height="14"/>
    <rect x="654" y="322" width="22" height="14"/><rect x="678" y="322" width="22" height="14"/>
    <rect x="702" y="322" width="22" height="14"/><rect x="726" y="322" width="22" height="14"/>
    <rect x="750" y="322" width="22" height="14"/><rect x="774" y="322" width="22" height="14"/>
    <rect x="798" y="322" width="22" height="14"/><rect x="822" y="322" width="22" height="14"/>
  </g>
  <text x="864" y="334" fill="#ffffff" font-size="18" font-weight="bold">999 / 999</text>

  <!-- Secondary stats -->
  <g fill="#ffd93d" font-size="17" font-weight="bold">
    <text x="376" y="370">ATTACK  99</text>
    <text x="518" y="370">DEFENSE  99</text>
    <text x="680" y="370">AGILITY  99</text>
    <text x="830" y="370">WISDOM  99</text>
  </g>

  <!-- ===== BOTTOM FLAVOR DIALOG ===== -->
  <rect x="60" y="410" width="900" height="110" fill="#000055" stroke="#ffffff" stroke-width="3"/>
  <g fill="#ffffff" font-size="18" font-weight="bold">
    <text x="80" y="442">* WELCOME, BRAVE TRAVELER. THOU HAST ENTERED THE SCROLL OF A WANDERING CODER.</text>
    <text x="80" y="472">* THY QUEST : TO FORGE AI ARTIFACTS AND DELIVER THEM UNTO THE WORLD.</text>
    <text x="80" y="502">* SCROLL DOWN TO READ ON.</text>
  </g>
  <!-- Blinking pointer triangle at bottom right -->
  <g fill="#ffffff">
    <polygon points="924,498 940,498 932,510"/>
  </g>
</svg>

    <g transform="translate(20, 18)" fill="#a8ffc8">
      <rect x="8" y="4" width="4" height="4"/>
      <rect x="4" y="8" width="4" height="4"/>
    </g>
    <text x="60" y="34" fill="#4ade80" font-size="16" font-weight="bold" letter-spacing="2">HEAL  -  THE  LLM  SCHOOL</text>

    <g fill="#a8d8ff" font-size="11" font-weight="bold">
      <text x="24" y="66">MP</text>
      <text x="60" y="66">SPELL</text>
      <text x="210" y="66">EFFECT</text>
    </g>
    <line x1="20" y1="72" x2="440" y2="72" stroke="#4a4a7a" stroke-width="1"/>

    <g font-size="13" font-weight="bold">
      <text x="24" y="94" fill="#ffd93d">6</text>
      <text x="60" y="94" fill="#ffffff">RAGULA</text>
      <text x="210" y="94" fill="#c8c8ff">Retrieve lost lore</text>

      <text x="24" y="118" fill="#ffd93d">5</text>
      <text x="60" y="118" fill="#ffffff">NL2SQL</text>
      <text x="210" y="118" fill="#c8c8ff">Speech to query-rune</text>

      <text x="24" y="142" fill="#ffd93d">5</text>
      <text x="60" y="142" fill="#ffffff">PROMPTIRA</text>
      <text x="210" y="142" fill="#c8c8ff">CoT / Self-reflect</text>

      <text x="24" y="166" fill="#ffd93d">8</text>
      <text x="60" y="166" fill="#ffffff">LORALITE</text>
      <text x="210" y="166" fill="#c8c8ff">Fine-tune LoRA/DoRA</text>

      <text x="24" y="190" fill="#ffd93d">7</text>
      <text x="60" y="190" fill="#ffffff">DPO-ALIGN</text>
      <text x="210" y="190" fill="#c8c8ff">Align via SFT / DPO</text>

      <text x="24" y="214" fill="#ffd93d">6</text>
      <text x="60" y="214" fill="#ffffff">VLLM-HASTE</text>
      <text x="210" y="214" fill="#c8c8ff">Haste LLM inference</text>
    </g>
  </g>

  <!-- =============== BOTTOM-RIGHT: SUMMON / AGENT =============== -->
  <g transform="translate(510, 360)">
    <rect width="450" height="230" fill="#000055" stroke="#ffffff" stroke-width="2"/>

    <rect x="10" y="10" width="430" height="36" fill="#4a1c5c" stroke="#c084fc" stroke-width="2"/>
    <!-- Pixel pentagram/star icon -->
    <g transform="translate(22, 20)" fill="#c084fc">
      <rect x="6" y="0" width="4" height="4"/>
      <rect x="0" y="6" width="16" height="4"/>
      <rect x="2" y="10" width="12" height="4"/>
      <rect x="4" y="14" width="2" height="4"/>
      <rect x="10" y="14" width="2" height="4"/>
    </g>
    <text x="60" y="34" fill="#c084fc" font-size="16" font-weight="bold" letter-spacing="2">SUMMON  -  THE  AGENT  SCHOOL</text>

    <g fill="#a8d8ff" font-size="11" font-weight="bold">
      <text x="24" y="66">MP</text>
      <text x="60" y="66">SPELL</text>
      <text x="210" y="66">EFFECT</text>
    </g>
    <line x1="20" y1="72" x2="440" y2="72" stroke="#4a4a7a" stroke-width="1"/>

    <g font-size="13" font-weight="bold">
      <text x="24" y="94" fill="#ffd93d">9</text>
      <text x="60" y="94" fill="#ffffff">METAGPT</text>
      <text x="210" y="94" fill="#c8c8ff">Summon agent swarm</text>

      <text x="24" y="118" fill="#ffd93d">8</text>
      <text x="60" y="118" fill="#ffffff">ADKALL</text>
      <text x="210" y="118" fill="#c8c8ff">Invoke ADK lattice</text>

      <text x="24" y="142" fill="#ffd93d">7</text>
      <text x="60" y="142" fill="#ffffff">CLAUDIMA</text>
      <text x="210" y="142" fill="#c8c8ff">Consult Claude Code</text>

      <text x="24" y="166" fill="#ffd93d">6</text>
      <text x="60" y="166" fill="#ffffff">CURSORA</text>
      <text x="210" y="166" fill="#c8c8ff">Channel Cursor 5x</text>

      <text x="24" y="190" fill="#ffd93d">4</text>
      <text x="60" y="190" fill="#ffffff">MCP-BIND</text>
      <text x="210" y="190" fill="#c8c8ff">Link tools via MCP</text>

      <text x="24" y="214" fill="#ffd93d">5</text>
      <text x="60" y="214" fill="#ffffff">SKILLIRA</text>
      <text x="210" y="214" fill="#c8c8ff">Teach via SKILL scroll</text>
    </g>
  </g>
</svg>

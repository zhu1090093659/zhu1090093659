<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" width="1000" height="440" shape-rendering="crispEdges" font-family="'Courier New', ui-monospace, monospace">
  <defs>
    <linearGradient id="mapSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a6e"/>
      <stop offset="100%" stop-color="#020218"/>
    </linearGradient>
    <pattern id="grass" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#1c5a2e"/>
      <rect x="3" y="3" width="3" height="3" fill="#2c7a3e"/>
      <rect x="15" y="9" width="3" height="3" fill="#2c7a3e"/>
      <rect x="9" y="15" width="3" height="3" fill="#124422"/>
      <rect x="18" y="18" width="3" height="3" fill="#124422"/>
    </pattern>
    <pattern id="water" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#1a3a7a"/>
      <rect x="2" y="6" width="8" height="2" fill="#3a6ab0"/>
      <rect x="18" y="14" width="8" height="2" fill="#3a6ab0"/>
      <rect x="6" y="22" width="8" height="2" fill="#3a6ab0"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="440" fill="url(#mapSky)"/>

  <!-- Dialog outer border -->
  <rect x="12" y="12" width="976" height="416" fill="#000033" stroke="#ffffff" stroke-width="4"/>
  <rect x="24" y="24" width="952" height="392" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Title -->
  <rect x="40" y="40" width="920" height="48" fill="#000055" stroke="#ffd93d" stroke-width="2"/>
  <g fill="#ffd93d">
    <rect x="210" y="62" width="4" height="4"/><rect x="206" y="66" width="12" height="4"/><rect x="210" y="70" width="4" height="4"/>
    <rect x="786" y="62" width="4" height="4"/><rect x="782" y="66" width="12" height="4"/><rect x="786" y="70" width="4" height="4"/>
  </g>
  <text x="500" y="72" fill="#ffd93d" font-size="22" font-weight="bold" text-anchor="middle" letter-spacing="4">QUEST  LOG  ·  THE  HERO'S  JOURNEY</text>

  <!-- Map area -->
  <rect x="40" y="104" width="920" height="200" fill="#0f1840" stroke="#ffffff" stroke-width="2"/>
  <!-- Water areas -->
  <rect x="42" y="106" width="916" height="196" fill="url(#water)"/>
  <!-- Continents / grass patches -->
  <!-- Land mass 1 (left, academy) -->
  <rect x="70" y="130" width="160" height="120" fill="url(#grass)" stroke="#ffd93d" stroke-width="2"/>
  <!-- Land mass 2 (middle, MGX) -->
  <rect x="320" y="150" width="200" height="140" fill="url(#grass)" stroke="#ffd93d" stroke-width="2"/>
  <!-- Land mass 3 (right, current) -->
  <rect x="620" y="130" width="280" height="140" fill="url(#grass)" stroke="#ffd93d" stroke-width="2"/>

  <!-- Castle 1 (Academy) -->
  <g transform="translate(110, 160)">
    <!-- Towers -->
    <rect x="0" y="20" width="14" height="30" fill="#a0a0a0"/>
    <rect x="0" y="14" width="14" height="6" fill="#707070"/>
    <rect x="0" y="10" width="4" height="4" fill="#a0a0a0"/>
    <rect x="10" y="10" width="4" height="4" fill="#a0a0a0"/>
    <rect x="48" y="20" width="14" height="30" fill="#a0a0a0"/>
    <rect x="48" y="14" width="14" height="6" fill="#707070"/>
    <rect x="48" y="10" width="4" height="4" fill="#a0a0a0"/>
    <rect x="58" y="10" width="4" height="4" fill="#a0a0a0"/>
    <!-- Main castle body -->
    <rect x="14" y="26" width="34" height="24" fill="#c0c0c0"/>
    <rect x="14" y="20" width="34" height="6" fill="#909090"/>
    <rect x="22" y="34" width="16" height="16" fill="#2b2b2b"/><!-- door -->
    <rect x="16" y="30" width="4" height="4" fill="#4da8ff"/><!-- window -->
    <rect x="42" y="30" width="4" height="4" fill="#4da8ff"/><!-- window -->
    <!-- Flag -->
    <rect x="31" y="0" width="2" height="14" fill="#ffffff"/>
    <rect x="33" y="2" width="10" height="6" fill="#ff5252"/>
  </g>

  <!-- Castle 2 (MGX) - styled differently -->
  <g transform="translate(380, 178)">
    <rect x="0" y="16" width="18" height="40" fill="#805030"/>
    <rect x="0" y="10" width="18" height="6" fill="#5c3a1f"/>
    <rect x="4" y="4" width="10" height="6" fill="#805030"/>
    <rect x="72" y="16" width="18" height="40" fill="#805030"/>
    <rect x="72" y="10" width="18" height="6" fill="#5c3a1f"/>
    <rect x="76" y="4" width="10" height="6" fill="#805030"/>
    <rect x="18" y="20" width="54" height="36" fill="#a06040"/>
    <rect x="18" y="16" width="54" height="4" fill="#5c3a1f"/>
    <rect x="36" y="28" width="18" height="28" fill="#2b2b2b"/>
    <rect x="24" y="24" width="6" height="6" fill="#ffd93d"/>
    <rect x="60" y="24" width="6" height="6" fill="#ffd93d"/>
    <!-- Flag -->
    <rect x="44" y="-6" width="2" height="12" fill="#ffffff"/>
    <rect x="46" y="-4" width="10" height="6" fill="#4da8ff"/>
  </g>

  <!-- Castle 3 (Current - GOLD CITY SHENZHEN) - largest, gold -->
  <g transform="translate(700, 150)">
    <!-- Outer walls with battlements -->
    <rect x="0" y="50" width="180" height="50" fill="#b87030"/>
    <rect x="0" y="44" width="180" height="6" fill="#804020"/>
    <!-- Battlements on top -->
    <g fill="#b87030">
      <rect x="0" y="38" width="12" height="6"/><rect x="20" y="38" width="12" height="6"/>
      <rect x="40" y="38" width="12" height="6"/><rect x="60" y="38" width="12" height="6"/>
      <rect x="80" y="38" width="12" height="6"/><rect x="100" y="38" width="12" height="6"/>
      <rect x="120" y="38" width="12" height="6"/><rect x="140" y="38" width="12" height="6"/>
      <rect x="160" y="38" width="12" height="6"/><rect x="168" y="38" width="12" height="6"/>
    </g>
    <!-- Central tower (tall gold) -->
    <rect x="70" y="10" width="40" height="50" fill="#d4a040"/>
    <rect x="70" y="4" width="40" height="6" fill="#b87030"/>
    <rect x="74" y="-8" width="32" height="12" fill="#d4a040"/>
    <rect x="74" y="-14" width="32" height="6" fill="#ffd93d"/>
    <!-- Tower details -->
    <rect x="82" y="18" width="16" height="16" fill="#2b2b2b"/>
    <rect x="82" y="40" width="16" height="20" fill="#2b2b2b"/>
    <!-- Flag -->
    <rect x="88" y="-30" width="4" height="16" fill="#ffffff"/>
    <rect x="92" y="-28" width="16" height="10" fill="#ffd93d"/>
    <rect x="96" y="-24" width="6" height="2" fill="#b87030"/>
    <!-- Side towers -->
    <rect x="20" y="20" width="24" height="30" fill="#d4a040"/>
    <rect x="20" y="14" width="24" height="6" fill="#b87030"/>
    <rect x="28" y="26" width="8" height="10" fill="#2b2b2b"/>
    <rect x="136" y="20" width="24" height="30" fill="#d4a040"/>
    <rect x="136" y="14" width="24" height="6" fill="#b87030"/>
    <rect x="144" y="26" width="8" height="10" fill="#2b2b2b"/>
    <!-- Gold sparkles -->
    <g fill="#ffd93d">
      <rect x="10" y="62" width="2" height="2"/><rect x="6" y="66" width="2" height="2"/><rect x="14" y="66" width="2" height="2"/><rect x="10" y="70" width="2" height="2"/>
      <rect x="170" y="62" width="2" height="2"/><rect x="166" y="66" width="2" height="2"/><rect x="174" y="66" width="2" height="2"/><rect x="170" y="70" width="2" height="2"/>
    </g>
  </g>

  <!-- Path lines connecting castles (dotted gold path) -->
  <g fill="#ffd93d">
    <!-- Castle 1 to Castle 2 -->
    <rect x="240" y="214" width="6" height="6"/><rect x="254" y="218" width="6" height="6"/>
    <rect x="268" y="222" width="6" height="6"/><rect x="282" y="226" width="6" height="6"/>
    <rect x="296" y="226" width="6" height="6"/><rect x="310" y="222" width="6" height="6"/>
    <!-- Castle 2 to Castle 3 -->
    <rect x="532" y="218" width="6" height="6"/><rect x="548" y="214" width="6" height="6"/>
    <rect x="566" y="210" width="6" height="6"/><rect x="584" y="208" width="6" height="6"/>
    <rect x="602" y="210" width="6" height="6"/>
    <!-- Hero sprite walking indicator (small slime at current location) -->
  </g>
  <!-- Mini slime at current position (gold city) -->
  <g transform="translate(780, 250)">
    <rect x="6" y="0" width="4" height="2" fill="#4da8ff"/>
    <rect x="4" y="2" width="8" height="2" fill="#4da8ff"/>
    <rect x="2" y="4" width="12" height="2" fill="#4da8ff"/>
    <rect x="0" y="6" width="16" height="4" fill="#4da8ff"/>
    <rect x="2" y="6" width="2" height="2" fill="#ffffff"/>
    <rect x="12" y="6" width="2" height="2" fill="#ffffff"/>
    <rect x="0" y="10" width="16" height="2" fill="#4da8ff"/>
  </g>

  <!-- Labels above castles -->
  <g fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">
    <rect x="72" y="116" width="156" height="14" fill="#000033" stroke="#ffffff" stroke-width="1"/>
    <text x="150" y="126">ACADEMIES · 2018 - 2025</text>
    <rect x="336" y="136" width="168" height="14" fill="#000033" stroke="#ffffff" stroke-width="1"/>
    <text x="420" y="146">METAGPT GUILD · 2024 - 2026</text>
    <rect x="640" y="116" width="240" height="14" fill="#000033" stroke="#ffd93d" stroke-width="1"/>
    <text x="760" y="126" fill="#ffd93d">★  GOLD CITY · 2026 - NOW  ★</text>
  </g>

  <!-- ===== BOTTOM CAPTIONS BOX ===== -->
  <rect x="40" y="320" width="920" height="96" fill="#000055" stroke="#ffffff" stroke-width="3"/>
  <g fill="#ffffff" font-size="15" font-weight="bold">
    <text x="60" y="348">* FROM THE SCHOLARS' ACADEMIES OF THE WESTERN REALM</text>
    <text x="60" y="372">  THE HERO JOURNEYED EAST TO JOIN THE METAGPT GUILD,</text>
    <text x="60" y="396">  FORGING AGENTS OF GREAT POWER FOR THE SKYFARING KINGS.</text>
  </g>
  <g fill="#ffd93d" font-size="15" font-weight="bold">
    <text x="960" y="396" text-anchor="end">▼</text>
  </g>
</svg>
